                const middleY = clientY - (top + height / 2);
                setPosition({ x: middleX * 0.2, y: middleY * 0.2 });
            };
            
            const reset = () => setPosition({ x: 0, y: 0 });
            
            return (
                <motion.div ref={ref} onMouseMove={handleMouse} onMouseLeave={reset} animate={{ x: position.x, y: position.y }} transition={{ type: "spring", stiffness: 150, damping: 15, mass: 0.1 }}>

        const AnimatedNumber = ({ value, prefix = "", suffix = "" }) => {
            const [count, setCount] = useState(0);
            const ref = useRef(null);
            const inView = useInView(ref, { once: true, margin: "-100px" });

            useEffect(() => {
                if(inView) {
                    let start = 0;
                    const duration = 2000;
                    const increment = value / (duration / 16);
                    const timer = setInterval(() => {
                        start += increment;
                        if(start >= value) { setCount(value); clearInterval(timer); }
                        else { setCount(Math.ceil(start)); }
                    }, 16);
                    return () => clearInterval(timer);
                }
            },[inView, value]);

            return <span ref={ref}>{prefix}{count}{suffix}</span>;

                                        <p className="text-neutral-500 text-[10px] font-black uppercase tracking-widest mb-1">Starting price</p>
                                        <div className="text-4xl font-black font-syne">
                                            {p.priceINR} <span className="text-blue-500/50 mx-1 text-2xl font-normal">|</span> <span className="text-2xl text-neutral-400">{p.priceUSD}</span>
                                        </div>
                                    </div>

                                    <p className="text-neutral-400 text-sm mb-10 leading-relaxed">{p.desc}</p>
                                    <div className="space-y-4 mb-12 flex-grow">
                                        {p.features.map((f, j) => (
                                            <div key={j} className="flex items-center gap-3 text-sm font-bold text-neutral-300">
                                                <i className="fa-solid fa-circle-check text-blue-500 text-lg"></i> {f}
                                            </div>
                                        ))}
                                    </div>
                                    
                                    {p.popular && <div className="text-center mb-4 text-[10px] text-red-400 font-black uppercase tracking-widest animate-pulse"><i className="fa-solid fa-hourglass-half"></i> Only 2 Slots Left This Month</div>}
                                    
                                    <a href="#inquiry" className={`w-full py-5 rounded-2xl font-black text-xs uppercase tracking-widest text-center transition duration-500 ${p.popular ? 'bg-blue-600 text-white btn-premium' : 'bg-white/5 hover:bg-white/10'}`}>
                                        Select {p.name}
                                    </a>
                                </motion.div>
                            ))}
                        </div>
                        <div className="mt-12 text-center text-neutral-500 flex justify-center items-center gap-4 text-xs font-bold uppercase tracking-widest">
                            <span><i className="fa-solid fa-shield-halved text-blue-500"></i> 100% Secure Payments</span>
                            <span>•</span>
                            <span><i className="fa-solid fa-file-contract text-blue-500"></i> Strict NDA Protocol</span>
                        </div>
                    </div>
                </section>
            );
        };

        const Inquiry = () => {
            const handleSubmit = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const text = `New Premium Lead: %0A- Name: ${fd.get('name')}%0A- Email: ${fd.get('email')}%0A- Service: ${fd.get('service')}%0A- Message: ${fd.get('msg')}`;
                
                confetti({ particleCount: 150, spread: 100, origin: { y: 0.8 }, colors:['#3b82f6', '#8b5cf6', '#ffffff'] });

                setTimeout(() => {
                    window.open(`https://wa.me/919058327063?text=${text}`, '_blank');
                }, 1000);
            };

            return (
                <section id="inquiry" className="py-32 px-6 relative">
                    <motion.div 
                        initial={{ opacity: 0, scale: 0.95 }}
                        whileInView={{ opacity: 1, scale: 1 }}
                        viewport={{ once: true }}
                        className="max-w-5xl mx-auto glass-card p-8 md:p-20 rounded-[40px] md:rounded-[60px] relative overflow-hidden text-white shadow-2xl"
                    >
                        <div className="absolute top-0 right-0 w-96 h-96 bg-blue-600/10 blur-[120px] pointer-events-none"></div>
                        <div className="absolute bottom-0 left-0 w-96 h-96 bg-purple-600/10 blur-[120px] pointer-events-none"></div>
                        
                        <div className="text-center mb-16 relative z-10">
                            <h2 className="text-4xl md:text-6xl font-black mb-6 font-syne">Let's Build Your <span className="text-blue-600">Legacy.</span></h2>
                            <p className="text-neutral-400 text-lg md:text-xl max-w-2xl mx-auto">Book your free 30-minute growth audit with our expert team to uncover hidden revenue levers.</p>
                        </div>
                        <form className="grid md:grid-cols-2 gap-8 relative z-10" onSubmit={handleSubmit}>
                            <div className="space-y-2 group">
                                <label className="text-[10px] font-black text-neutral-500 uppercase tracking-widest ml-4 group-focus-within:text-blue-500 transition-colors">Full Name</label>
                                <input name="name" type="text" placeholder="John Doe" required className="w-full bg-white/5 border border-white/10 p-6 rounded-2xl outline-none focus:border-blue-500 focus:bg-white/10 transition font-bold text-white shadow-inner" />
                            </div>
                            <div className="space-y-2 group">
                                <label className="text-[10px] font-black text-neutral-500 uppercase tracking-widest ml-4 group-focus-within:text-blue-500 transition-colors">Business Email</label>
                                <input name="email" type="email" placeholder="john@company.com" required className="w-full bg-white/5 border border-white/10 p-6 rounded-2xl outline-none focus:border-blue-500 focus:bg-white/10 transition font-bold text-white shadow-inner" />
                            </div>
                            <div className="space-y-2 group">
                                <label className="text-[10px] font-black text-neutral-500 uppercase tracking-widest ml-4 group-focus-within:text-blue-500 transition-colors">Service Required</label>
                                <select name="service" required className="w-full bg-white/5 border border-white/10 p-6 rounded-2xl outline-none focus:border-blue-500 focus:bg-white/10 transition font-bold text-white appearance-none cursor-pointer">
                                    <option value="" className="bg-[#0a0a0a] text-neutral-500">Select Capability</option>
                                    <option value="Mega Plan" className="bg-[#0a0a0a] text-blue-400 font-black">🔥 MEGA PLAN (₹79k)</option>
                                    {SERVICES.map(s => <option key={s.id} value={s.title} className="bg-[#0a0a0a]">{s.title}</option>)}
                                </select>
                            </div>
                            <div className="space-y-2 group">
                                <label className="text-[10px] font-black text-neutral-500 uppercase tracking-widest ml-4 group-focus-within:text-blue-500 transition-colors">Monthly Budget</label>
                                <select name="budget" required className="w-full bg-white/5 border border-white/10 p-6 rounded-2xl outline-none focus:border-blue-500 focus:bg-white/10 transition font-bold text-white appearance-none cursor-pointer">
                                    <option value="" className="bg-[#0a0a0a] text-neutral-500">Select Budget</option>
                                    <option className="bg-[#0a0a0a]">₹7,000 - ₹25,000</option>
                                    <option className="bg-[#0a0a0a]">₹25,000 - ₹50,000</option>
                                    <option className="bg-[#0a0a0a]">₹79,000 (Mega Plan)</option>
                                    <option className="bg-[#0a0a0a]">₹1,00,000+</option>
                                </select>
                            </div>
                            <div className="md:col-span-2 space-y-2 group">
                                <label className="text-[10px] font-black text-neutral-500 uppercase tracking-widest ml-4 group-focus-within:text-blue-500 transition-colors">Project Goals</label>
                                <textarea name="msg" placeholder="Tell us about your current challenges and goals..." className="w-full bg-white/5 border border-white/10 p-6 rounded-2xl outline-none focus:border-blue-500 focus:bg-white/10 transition h-32 font-bold text-white shadow-inner resize-none"></textarea>
                            </div>
                            <button type="submit" className="md:col-span-2 bg-blue-600 py-6 rounded-2xl font-black text-xl uppercase tracking-[0.2em] btn-premium text-white shadow-[0_10px_30px_rgba(37,99,235,0.4)] flex items-center justify-center gap-3">
                                Claim Free Strategy Call <i className="fa-solid fa-arrow-right"></i>
                            </button>
                        </form>
                    </motion.div>
                </section>
            );
        };

        const App = () => {
            const[showSticky, setShowSticky] = useState(false);
            const [fabOpen, setFabOpen] = useState(false);
            const[exitIntent, setExitIntent] = useState(false);
            
            const { scrollYProgress } = useScroll();
            const scaleX = useSpring(scrollYProgress, { stiffness: 100, damping: 30, restDelta: 0.001 });

            // Sticky CTA Logic
            useEffect(() => {
                const handleScroll = () => setShowSticky(window.scrollY > 800);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            },[]);

            // Exit Intent Logic
            useEffect(() => {
                const handleMouseLeave = (e) => {
                    if (e.clientY <= 0 && !sessionStorage.getItem('exitShown')) {
                        setExitIntent(true);
                        sessionStorage.setItem('exitShown', 'true');
                    }
                };
                document.addEventListener('mouseleave', handleMouseLeave);
                return () => document.removeEventListener('mouseleave', handleMouseLeave);
            },[]);

            const handleBack = () => {
                if (window.history.length > 1) { window.history.back(); }
                else { window.scrollTo({ top: 0, behavior: 'smooth' }); }
            };

            return (
                <div className="relative font-sans text-white bg-[#050505]">
                    {/* Global Progress Bar */}
                    <motion.div className="fixed top-0 left-0 right-0 h-1 bg-gradient-to-r from-blue-600 via-purple-600 to-blue-600 z-[10000] origin-left" style={{ scaleX }} />
                    
                    <Navbar />
                    <motion.div initial={{opacity:0}} animate={{opacity:1}} transition={{duration:1}}>
                        <Hero />
                        <ClientMarquee />
                        <Stats />
                        <DashboardPreview />
                        <Services />
                        <CaseStudies />
                        <Testimonials />
                        
                        <Team />
                        <Blog />
                        
                        <Pricing />
                        <Inquiry />
                        
                        <footer className="py-12 px-6 border-t border-white/5 bg-[#050505] text-center">
                            <h2 className="text-2xl font-black font-syne mb-4">NEXTSTEP<span className="text-blue-500">.</span></h2>
                            <p className="text-neutral-500 text-xs font-bold uppercase tracking-widest">© 2026 NEXTSTEP TECHNOLOGIES. ALL RIGHTS RESERVED.</p>
                        </footer>
                    </motion.div>

                    <Magnetic>
                        <button aria-label="Go Back" onClick={handleBack} className="fixed bottom-10 left-6 lg:left-10 w-12 h-12 glass-card rounded-2xl flex items-center justify-center text-white z-[900] hover:bg-white/10 transition group shadow-lg">
                            <i className="fa-solid fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
                        </button>
                    </Magnetic>

                    <AnimatePresence>
                        {showSticky && (
                            <motion.div 
                                initial={{ y: 100 }}
                                animate={{ y: 0 }}
                                exit={{ y: 100 }}
                                className="fixed bottom-0 left-0 w-full bg-[#050505]/90 backdrop-blur-2xl border-t border-white/10 z-[800] py-4 px-6 flex flex-col md:flex-row justify-center items-center gap-4 shadow-[0_-10px_40px_rgba(0,0,0,0.8)]"
                            >
                                <div className="flex items-center gap-2">
                                    <span className="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                                    <p className="text-xs md:text-sm font-bold text-white">Limited Slots Available For Mega Plan!</p>
                                </div>
                                <a href="#inquiry" className="bg-blue-600 text-white px-6 py-2 rounded-full text-xs font-black uppercase tracking-widest hover:bg-blue-700 transition shadow-lg">Claim Yours Now</a>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    <AnimatePresence>
                        {exitIntent && (
                            <motion.div 
                                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                                className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[10000] flex items-center justify-center p-6"
                            >
                                <motion.div 
                                    initial={{ scale: 0.9, y: 20 }} animate={{ scale: 1, y: 0 }} exit={{ scale: 0.9, y: 20 }}
                                    className="glass-card max-w-lg w-full p-10 rounded-[40px] text-center border border-blue-500/30 relative"
                                >
                                    <button aria-label="Close Intent" onClick={() => setExitIntent(false)} className="absolute top-6 right-6 text-2xl text-neutral-500 hover:text-white transition"><i className="fa-solid fa-xmark"></i></button>
                                    <div className="w-20 h-20 bg-blue-600/20 rounded-full flex items-center justify-center mx-auto mb-6 text-blue-500 text-3xl">
                                        <i className="fa-solid fa-gift"></i>
                                    </div>
                                    <h3 className="text-3xl font-black font-syne mb-4">Wait! Don't Leave Yet.</h3>
                                    <p className="text-neutral-400 mb-8 leading-relaxed">Book a free strategy call right now and get a comprehensive business growth audit absolutely free.</p>
                                    <a href="#inquiry" onClick={() => setExitIntent(false)} className="block w-full py-4 bg-blue-600 rounded-2xl font-black text-white text-lg btn-premium">Get Free Audit</a>
                                    <button onClick={() => setExitIntent(false)} className="mt-4 text-xs text-neutral-500 font-bold uppercase hover:text-white transition">No thanks, I don't want to grow</button>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    <div className="fixed bottom-24 md:bottom-10 right-6 lg:right-10 z-[900] flex flex-col items-end gap-4">
                        <AnimatePresence>
                            {fabOpen && (
                                <motion.div initial={{ opacity: 0, y: 20, scale: 0.8 }} animate={{ opacity: 1, y: 0, scale: 1 }} exit={{ opacity: 0, y: 20, scale: 0.8 }} className="flex flex-col gap-3 mb-2">
                                    <Magnetic>
                                        <a href="https://wa.me/919058327063" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp Us" className="w-12 h-12 bg-[#25D366] rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(37,211,102,0.4)] hover:scale-110 transition-transform">
                                            <i className="fa-brands fa-whatsapp text-white text-xl"></i>
                                        </a>
                                    </Magnetic>
                                    <Magnetic>
                                        <a href="mailto:hello@nextstep.tech" aria-label="Email Us" className="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(37,99,235,0.4)] hover:scale-110 transition-transform">
                                            <i className="fa-solid fa-envelope text-white text-xl"></i>
                                        </a>
                                    </Magnetic>
                                </motion.div>
                            )}
                        </AnimatePresence>
                        <Magnetic>
                            <button aria-label="Contact Options" onClick={() => setFabOpen(!fabOpen)} className={`w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(255,255,255,0.2)] transition-transform duration-500 ${fabOpen ? 'rotate-45 bg-neutral-200' : ''}`}>
                                <i className="fa-solid fa-address-book text-[#050505] text-xl"></i>
                            </button>
                        </Magnetic>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
